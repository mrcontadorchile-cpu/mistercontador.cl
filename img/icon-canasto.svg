<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Canasto: cuerpo trapezoidal estilo boceto -->
  <!-- Asas izquierda -->
  <path d="M22 38 Q18 26 26 22" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Asas derecha -->
  <path d="M98 38 Q102 26 94 22" stroke="#888" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Cuerpo del canasto -->
  <path d="M18 38 L28 90 Q30 96 36 96 L84 96 Q90 96 92 90 L102 38 Z" fill="#e8e8e8" stroke="#999" stroke-width="2"/>

  <!-- Líneas verticales del canasto -->
  <line x1="40" y1="40" x2="36" y2="94" stroke="#bbb" stroke-width="1.5"/>
  <line x1="55" y1="39" x2="55" y2="95" stroke="#bbb" stroke-width="1.5"/>
  <line x1="70" y1="39" x2="70" y2="95" stroke="#bbb" stroke-width="1.5"/>
  <line x1="85" y1="40" x2="84" y2="94" stroke="#bbb" stroke-width="1.5"/>

  <!-- Líneas horizontales del canasto -->
  <path d="M21 52 L99 52" stroke="#bbb" stroke-width="1.5"/>
  <path d="M23 65 L97 65" stroke="#bbb" stroke-width="1.5"/>
  <path d="M25 78 L95 78" stroke="#bbb" stroke-width="1.5"/>

  <!-- Borde superior del canasto -->
  <rect x="16" y="35" width="88" height="8" rx="2" fill="#ccc" stroke="#aaa" stroke-width="1.5"/>

  <!-- Corbata dorada / checkmark que sale del canasto -->
  <!-- Forma de corbata: nudo arriba, cuerpo largo, punta abajo -->
  <g transform="translate(52, -2)">
    <!-- Nudo de corbata -->
    <polygon points="8,8 20,8 23,20 5,20" fill="#F5C200"/>
    <!-- Cuerpo de la corbata -->
    <polygon points="5,20 23,20 28,62 0,62" fill="#F5C200"/>
    <!-- Punta de la corbata -->
    <polygon points="0,62 28,62 14,76 14,76" fill="#F5C200"/>
    <!-- Brillo en la corbata -->
    <line x1="12" y1="24" x2="10" y2="58" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
